<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel MOBI - Creador Mágico</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ESTILO iOS / APPLE */
        :root {
            --bg-color: #F2F2F7; 
            --card-bg: #FFFFFF;
            --apple-blue: #007AFF;
            --apple-blue-hover: #005ecb;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --input-bg: #F2F2F7;
            --success: #34C759;
            --border-radius: 16px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .header-app {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-app h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-app p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; }

        /* Contenedor del Wizard */
        .wizard-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 25px 20px; 
            border-radius: var(--border-radius); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            overflow: hidden;
        }

        /* Control de Pasos */
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Indicador de progreso */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%; background-color: #D1D1D6; transition: 0.3s;
        }
        .dot.active { background-color: var(--apple-blue); width: 20px; border-radius: 10px;}

        h2 { margin-top: 0; font-size: 20px; font-weight: 600; margin-bottom: 20px; text-align: center;}

        label { display: block; margin-top: 15px; font-weight: 500; color: var(--text-muted); font-size: 13px; margin-bottom: 6px; }

        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; padding: 14px; background-color: var(--input-bg); border: 2px solid transparent; 
            border-radius: 12px; font-size: 15px; color: var(--text-main); box-sizing: border-box; 
            appearance: none; transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--apple-blue); background-color: #FFF; }
        input[type="color"] { width: 100%; height: 46px; border: none; border-radius: 12px; background-color: var(--input-bg); padding: 5px; }

        /* Botones */
        .btn-primary { 
            margin-top: 20px; width: 100%; padding: 16px; background-color: var(--apple-blue); color: white; 
            border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; 
        }
        .btn-primary:active { transform: scale(0.97); }
        
        .btn-secondary {
            margin-top: 10px; width: 100%; padding: 16px; background-color: #E5E5EA; color: var(--apple-blue); 
            border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        /* Listas temporales */
        .temp-list {
            margin-top: 15px; padding: 0; list-style: none;
        }
        .temp-list li {
            background: var(--input-bg); padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; display: flex; justify-content: space-between;
        }

        /* Enlace Final */
        .final-link-box {
            background-color: #E5F0FF; border: 2px dashed var(--apple-blue); padding: 20px; border-radius: 12px; text-align: center; margin: 20px 0;
        }
        .final-link-box a { color: var(--apple-blue); font-weight: bold; font-size: 18px; text-decoration: none; word-break: break-all;}
    </style>
</head>
<body>

    <div class="header-app">
        <h1>⚙️ MOBI Menús</h1>
        <p>Generador de Páginas</p>
    </div>

    <div class="wizard-container">
        
        <div class="progress-dots">
            <div class="dot active" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
        </div>

        <div id="step1" class="step active">
            <h2>Paso 1: Datos del Negocio</h2>
            <form id="form-step1">
                <label>Nombre del Negocio</label>
                <input type="text" id="rest-name" required placeholder="Ej: Pizzería Mario">
                
                <label>Enlace Único (Sin espacios)</label>
                <input type="text" id="rest-slug" required placeholder="Ej: pizzeria-mario">
                
                <label>Color Principal (Tema)</label>
                <input type="color" id="rest-color" value="#000000">
                
                <label>URL del Logo (Opcional)</label>
                <input type="text" id="rest-logo" placeholder="https://link.com/logo.png">
                
                <button type="submit" class="btn-primary" id="btn-next-1">Siguiente: Categorías ➔</button>
            </form>
        </div>

        <div id="step2" class="step">
            <h2>Paso 2: Categorías</h2>
            <p style="font-size: 13px; color: var(--text-muted); text-align: center; margin-top:-10px;">Añade secciones (Ej: Bebidas, Postres)</p>
            
            <form id="form-step2">
                <input type="text" id="cat-name" required placeholder="Nombre de categoría...">
                <button type="submit" class="btn-secondary">+ Añadir Categoría</button>
            </form>

            <ul class="temp-list" id="list-categories"></ul>

            <button type="button" class="btn-primary" onclick="goToStep(3)">Siguiente: Platos ➔</button>
        </div>

        <div id="step3" class="step">
            <h2>Paso 3: Menú y Precios</h2>
            
            <form id="form-step3">
                <label>Categoría</label>
                <select id="item-cat-select" required></select>

                <label>Plato / Producto</label>
                <input type="text" id="item-name" required placeholder="Ej: Pizza Margarita">
                
                <label>Descripción</label>
                <textarea id="item-desc" rows="2" placeholder="Ingredientes..."></textarea>
                
                <label>Precio ($)</label>
                <input type="number" step="0.01" id="item-price" required placeholder="Ej: 12.50">
                
                <label>URL Foto (Opcional)</label>
                <input type="text" id="item-image" placeholder="https://link.com/foto.jpg">
                
                <button type="submit" class="btn-secondary">+ Añadir Plato</button>
            </form>

            <ul class="temp-list" id="list-items"></ul>

            <button type="button" class="btn-primary" onclick="goToStep(4)">🚀 Publicar Menú</button>
        </div>

        <div id="step4" class="step">
            <h2>¡Menú Publicado! 🎉</h2>
            <p style="text-align: center; color: var(--text-muted);">Tu página pública ya está activa. Copia este enlace y conviértelo en QR.</p>
            
            <div class="final-link-box">
                <a href="#" id="final-url" target="_blank">Cargando enlace...</a>
            </div>

            <button type="button" class="btn-secondary" onclick="resetWizard()">Crear otro restaurante</button>
        </div>

    </div>

    <script>
        // CONEXIÓN A SUPABASE
        const supabaseUrl = 'https://odsimxagdhrlagjsrdla.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kc2lteGFnZGhybGFnanNyZGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODgyMDQsImV4cCI6MjA4OTk2NDIwNH0.wRjw_2l9NgyV1R6M71NIqxkZflGvhWKJ5smcGj5oF1c';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        // VARIABLES GLOBALES DEL WIZARD
        let currentRestaurantId = null;
        let currentSlug = null;
        let categoriesAdded = [];

        // FUNCIÓN PARA MOVER PASOS
        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
            
            document.querySelectorAll('.dot').forEach((el, index) => {
                el.classList.toggle('active', index < stepNumber);
            });

            // Si llegamos al paso 3, cargar el desplegable de categorías
            if (stepNumber === 3) {
                const select = document.getElementById('item-cat-select');
                select.innerHTML = categoriesAdded.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }

            // Si llegamos al paso 4, generar el link (asumiendo que index.html y admin.html están en la misma carpeta)
            if (stepNumber === 4) {
                // Obtiene la ruta actual de tu navegador y la cambia por index.html
                const baseUrl = window.location.href.replace('admin.html', 'index.html').split('?')[0];
                const finalLink = `${baseUrl}?menu=${currentSlug}`;
                const urlElement = document.getElementById('final-url');
                urlElement.href = finalLink;
                urlElement.innerText = finalLink;
            }
        }

        // PASO 1: CREAR RESTAURANTE
        document.getElementById('form-step1').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-next-1');
            btn.innerText = "Guardando...";
            
            currentSlug = document.getElementById('rest-slug').value.toLowerCase().trim();

            // Usamos .select() al final para que Supabase nos devuelva el ID creado
            const { data, error } = await db.from('restaurants').insert([{
                name: document.getElementById('rest-name').value,
                slug: currentSlug,
                theme_color: document.getElementById('rest-color').value,
                logo_url: document.getElementById('rest-logo').value || null
            }]).select();
            
            if(!error && data) {
                currentRestaurantId = data[0].id;
                goToStep(2);
            } else { 
                alert("Error: " + error.message); 
                btn.innerText = "Siguiente: Categorías ➔";
            }
        });

        // PASO 2: AÑADIR CATEGORÍAS
        document.getElementById('form-step2').addEventListener('submit', async (e) => {
            e.preventDefault();
            const catName = document.getElementById('cat-name').value;
            
            const { data, error } = await db.from('categories').insert([{
                restaurant_id: currentRestaurantId,
                name: catName
            }]).select();
            
            if(!error && data) {
                categoriesAdded.push({ id: data[0].id, name: catName });
                document.getElementById('list-categories').innerHTML += `<li>${catName} <span>✓</span></li>`;
                document.getElementById('form-step2').reset();
            } else { alert("Error: " + error.message); }
        });

        // PASO 3: AÑADIR PLATOS
        document.getElementById('form-step3').addEventListener('submit', async (e) => {
            e.preventDefault();
            const itemName = document.getElementById('item-name').value;
            const price = parseFloat(document.getElementById('item-price').value);
            
            const { error } = await db.from('menu_items').insert([{
                category_id: document.getElementById('item-cat-select').value,
                name: itemName,
                description: document.getElementById('item-desc').value,
                price: price,
                image_url: document.getElementById('item-image').value || null
            }]);
            
            if(!error) {
                document.getElementById('list-items').innerHTML += `<li>${itemName} <span>$${price}</span></li>`;
                document.getElementById('form-step3').reset();
                document.getElementById('item-name').focus(); // Mantener teclado abierto en móvil
            } else { alert("Error: " + error.message); }
        });

        // REINICIAR TODO
        function resetWizard() {
            currentRestaurantId = null;
            currentSlug = null;
            categoriesAdded = [];
            document.getElementById('form-step1').reset();
            document.getElementById('list-categories').innerHTML = '';
            document.getElementById('list-items').innerHTML = '';
            document.getElementById('btn-next-1').innerText = "Siguiente: Categorías ➔";
            goToStep(1);
        }
    </script>
</body>
</html>
